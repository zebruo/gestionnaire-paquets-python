name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Résoudre la version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "EXE_NAME=GestionnairePaquets_v${VERSION}.exe" >> "$GITHUB_OUTPUT"
          echo "ZIP_NAME=GestionnairePaquets_v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer PyInstaller
        run: pip install pyinstaller

      - name: Vérifier les fichiers requis
        shell: bash
        run: |
          for f in python_versions_gui.py aide.md; do
            [ -f "$f" ] || { echo "Fichier manquant : $f"; exit 1; }
          done

      - name: Choisir le fichier spec
        id: spec
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SPEC_VERSIONED="GestionnairePaquets_v${VERSION}.spec"
          if [ -f "$SPEC_VERSIONED" ]; then
            echo "SPEC_FILE=${SPEC_VERSIONED}" >> "$GITHUB_OUTPUT"
          else
            echo "SPEC_FILE=GestionnairePaquets.spec" >> "$GITHUB_OUTPUT"
          fi

      - name: Injecter la version dans le source
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          (Get-Content python_versions_gui.py) `
            -replace 'VERSION = ".*"', "VERSION = `"$v`"" |
            Set-Content python_versions_gui.py

      - name: Compiler avec PyInstaller
        run: python -m PyInstaller "${{ steps.spec.outputs.SPEC_FILE }}" --noconfirm

      - name: Renommer l'exécutable
        shell: bash
        run: |
          EXE_NAME="${{ steps.version.outputs.EXE_NAME }}"
          # PyInstaller produit le nom défini dans le spec ; on cherche le .exe généré
          BUILT=$(find dist -name "*.exe" | head -1)
          if [ -z "$BUILT" ]; then
            echo "Aucun exe trouvé dans dist/"; exit 1
          fi
          mv "$BUILT" "dist/${EXE_NAME}"

      - name: Créer l'archive ZIP
        shell: bash
        run: |
          EXE_NAME="${{ steps.version.outputs.EXE_NAME }}"
          ZIP_NAME="${{ steps.version.outputs.ZIP_NAME }}"
          cd dist
          powershell Compress-Archive -Path "${EXE_NAME}" -DestinationPath "${ZIP_NAME}" -CompressionLevel Optimal

      - name: Uploader l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            dist/${{ steps.version.outputs.EXE_NAME }}
            dist/${{ steps.version.outputs.ZIP_NAME }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Résoudre la version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "EXE_NAME=GestionnairePaquets_v${VERSION}.exe" >> "$GITHUB_OUTPUT"
          echo "ZIP_NAME=GestionnairePaquets_v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Télécharger l'artefact
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: dist/

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "GestionnairePaquets v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Gestionnaire de paquets Python v${{ steps.version.outputs.VERSION }}

            Application Windows autonome (aucune installation Python requise).

            ### Installation
            Téléchargez `${{ steps.version.outputs.EXE_NAME }}` et lancez-le directement.

            ### Contenu du ZIP
            - `${{ steps.version.outputs.EXE_NAME }}` — exécutable autonome
          files: |
            dist/${{ steps.version.outputs.EXE_NAME }}
            dist/${{ steps.version.outputs.ZIP_NAME }}
          draft: false
          prerelease: false
